{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}

<div class="page-header"><h1>Forgot Password</h1></div>

<div class="card" style="max-width:480px; margin:0 auto;">
  <p style="color:#fff; margin-bottom:1.5rem;">
    Enter the email address on your account. If it matches a record, we'll email you a temporary password.
  </p>

  <form method="POST" action="{{ url_for('auth.forgot_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div style="margin-bottom:1rem;">
      <label style="color:#fff; display:block; margin-bottom:0.4rem;">Email Address</label>
      <input type="email" name="email" required placeholder="you@example.com"
        style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.35); color:#fff;"/>
    </div>

    <button type="submit" class="btn btn-primary">Send Temporary Password</button>
  </form>

  <p style="margin-top:1.5rem;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
</div>

{% endblock %}
